<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Lixo {% block titulo %} {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    {% extends 'base.html' %}
{% block conteudo %}
<div class="hero bg-base-200 p-10 rounded-box text-center shadow-inner">
    <div class="hero-content max-w-md mx-auto">
        <div>
            <h1 class="text-5xl font-bold">Descarte Consciente</h1>
            <p class="py-6">Ajude a proteger o meio ambiente dando o destino correto aos seus eletrônicos velhos ou quebrados. Nosso sistema conecta você a ecopontos da sua região!</p>
            <div class="flex gap-4 justify-center">
                <a href="{{ url_for('registroderesiduo') }}" class="btn btn-outline">Quero Descartar</a>
                <a href="{{ url_for('guiadedescarte') }}" class="btn bg-neutral text-white">Aprender Mais</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
</body>
</html>
